{{define "form/wireguard"}}
<a-form :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    <span>{{ i18n "reset" }}</span>
                </template>
                {{ i18n "pages.xray.wireguard.secretKey" }}
                <a-icon type="sync"
                    @click="[inbound.settings.pubKey, inbound.settings.secretKey] = Object.values(Wireguard.generateKeypair())">
                </a-icon>
            </a-tooltip>
        </template>
        <a-input v-model.trim="inbound.settings.secretKey"></a-input>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.xray.wireguard.publicKey" }}'>
        <a-input disabled v-model="inbound.settings.pubKey"></a-input>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.protocols.mtu" }}'>
        <a-input-number v-model.number="inbound.settings.mtu"></a-input-number>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.protocols.noKernelTun" }}'>
        <a-switch v-model="inbound.settings.noKernelTun"></a-switch>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.protocols.peers" }}'>
        <a-space>
            <a-button type="primary" size="small" @click="inbound.settings.addPeer()">+</a-button>
            <a-tooltip>
                <template slot="title">
                    <div style="font-size:12px;line-height:1.6;">
                        <b>Cloudflare WARP Quick Config</b><br/>
                        کلیدهای WARP را پر می‌کند.<br/>
                        برای IP اختصاصی از wgcf یا<br/>
                        <code>warp-go</code> استفاده کنید.
                    </div>
                </template>
                <a-button
                    type="dashed"
                    size="small"
                    style="border-color:#f5a623;color:#f5a623;"
                    @click="() => {
                        const warpPeer = inbound.settings.peers[0];
                        if (warpPeer) {
                            warpPeer.publicKey = 'bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=';
                            warpPeer.psk = '';
                            warpPeer.allowedIPs = ['0.0.0.0/0', '::/0'];
                            warpPeer.keepAlive = 25;
                        }
                        inbound.settings.mtu = 1280;
                        inbound.port = 2408;
                        this.$message.info('WARP endpoint: engage.cloudflareclient.com:2408 — برای IP اختصاصی از wgcf استفاده کنید');
                    }">
                    ☁️ WARP
                </a-button>
            </a-tooltip>
        </a-space>
    </a-form-item>

    <a-form v-for="(peer, index) in inbound.settings.peers" :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
        <a-divider style="margin:0;">
            Peer [[ index + 1 ]]
            <a-icon v-if="inbound.settings.peers.length>1" type="delete" @click="() => inbound.settings.delPeer(index)"
                    style="color: rgb(255, 77, 79);cursor: pointer;"/>
        </a-divider>
        <a-form-item>
            <template slot="label">
                <a-tooltip>
                    <template slot="title">
                        <span>{{ i18n "reset" }}</span>
                    </template>
                    {{ i18n "pages.xray.wireguard.secretKey" }}
                    <a-icon @click="[peer.publicKey, peer.privateKey] = Object.values(Wireguard.generateKeypair())"type="sync"> </a-icon>
                </a-tooltip>
            </template>
            <a-input v-model.trim="peer.privateKey"></a-input>
        </a-form-item>
        <a-form-item>
            <template slot="label">
                {{ i18n "pages.xray.wireguard.publicKey" }}
            </template>
            <a-input v-model.trim="peer.publicKey"></a-input>
        </a-form-item>
        <a-form-item>
            <template slot="label">
                <a-tooltip>
                    <template slot="title">
                        <span>{{ i18n "reset" }}</span>
                    </template>
                    {{ i18n "pages.xray.wireguard.psk" }}
                    <a-icon @click="peer.psk = Wireguard.keyToBase64(Wireguard.generatePresharedKey())"type="sync"> </a-icon>
                </a-tooltip>
            </template>
            <a-input v-model.trim="peer.psk"></a-input>
        </a-form-item>
        <a-form-item>
            <template slot="label">
                {{ i18n "pages.xray.wireguard.allowedIPs" }} <a-button type="primary" size="small" @click="peer.allowedIPs.push('')">+</a-button>
            </template>
            <template v-for="(aip, index) in peer.allowedIPs" style="margin-bottom: 10px;">
                <a-input v-model.trim="peer.allowedIPs[index]">
                    <a-button v-if="peer.allowedIPs.length>1" slot="addonAfter" size="small" @click="peer.allowedIPs.splice(index, 1)">-</a-button>
                </a-input>
            </template>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.protocols.keepAlive" }}'>
            <a-input-number v-model.number="peer.keepAlive" :min="0"></a-input-number>
        </a-form-item>    
    </a-form>
</a-form>
{{end}}
